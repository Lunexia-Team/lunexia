<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunexia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="upload.css">
</head>

<body>
    <div class="navbar">
        <ul>
            <li><a href="../indexPage/index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="../gamesPage/games.html"><i class="fa-solid fa-gamepad"></i> Games</a></li>
            <li><a href="../uploadPage/upload.html"><i class="fa-solid fa-upload"></i> Upload Game</a></li>
            <li><a href="../signUpPage/signUp.html"><i class="fa-solid fa-user"></i> Sign Up</a></li>
        </ul>
    </div>
    <div class="hero">
        <h1>Upload Your Game</h1>
        <p>It's time to share your masterpiece with the world!</p>
    </div>
    <div class="form-container">
        <h3>Game Details</h3>
        <table>
            <tr>
                <td>Game Title:</td>
                <td><input type="text" placeholder="e.g., Space Adventure"></td>
            </tr>
            <tr>
                <td>Category:</td>
                <td>
                    <select>
                        <option value="">Select a category...</option>
                        <option value="action">Action</option>
                        <option value="adventure">Adventure</option>
                        <option value="racing">Racing</option>
                        <option value="rpg">RPG</option>
                        <option value="simulation">Simulation</option>
                        <option value="sports">Sports</option>
                        <option value="strategy">Strategy</option>
                        <option value="puzzle">Puzzle</option>
                        <option value="horror">Horror</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Game File (.zip):</td>
                <td>
                    <input type="file" accept=".zip">
                    <a class="info-link" id="pdfAcBtn">
                        <i class="fa-solid fa-circle-info"></i> How to upload? View Guide (PDF)
                    </a>
                </td>
            </tr>

            <tr>
                <td>Cover Image:</td>
                <td><input type="file" accept="image/*"></td>
            </tr>
            <tr>
                <td colspan="2"><textarea cols="80" rows="5" placeholder="Game description and controls..."></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="button-container">
                    <input type="submit" value="Upload Game" class="form-button">
                </td>
            </tr>
        </table>
    </div>
    <div class="footer">
        <p>&copy; 2026 Lunexia - All rights reserved.</p>
    </div>
</body>

</html>
