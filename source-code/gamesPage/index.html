<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunexia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="games.css">
</head>

<body>
    <div class="navbar">
        <ul>
            <li><a href="/"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="/games"><i class="fa-solid fa-gamepad"></i> Games</a></li>
            <li><a href="/upload"><i class="fa-solid fa-upload"></i> Upload Game</a></li>
            <li><a href="/sign-up"><i class="fa-solid fa-user"></i> Sign Up</a></li>
        </ul>
    </div>
    <div class="hero">
        <h1>Games Collection</h1>
        <p>Discover trending games or find your next favorite adventure.</p>
    </div>
    <div class="game-title">
        <h2>Games</h2>
    </div>
    <div class="game-card-container">
        <div class="game-card">
            <div class="card-image">
                <img width="300px" height="160px" src="DTL.jpg" alt="Don't Touch The Lava">
            </div>
            <div class="card-content">
                <h3>Don't Touch The Lava!</h3>
                <p>Rating: ⭐️⭐️⭐️⭐️⭐️</p>
                <a href="/games/DTL" class="button">Play Now</a>
            </div>
        </div>
        <div class="game-card">
            <div class="card-image">
                <i class="fa-solid fa-chess-knight"></i>
            </div>
            <div class="card-content">
                <h3>Empire Strategy</h3>
                <p>Rating: ⭐️⭐️⭐️⭐️</p>
                <a href="/games/ES" class="button">Play Now</a>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 Lunexia - All rights reserved.</p>
    </div>
</body>

</html>
